<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>12bytes</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f5f7fb; color: #1f2937; }
        .wrap { max-width: 760px; margin: 0 auto; padding: 2rem 1rem; }
        .card { background: #fff; border-radius: 16px; padding: 1.5rem; box-shadow: 0 10px 25px rgba(0,0,0,.08); }
        .actions { display: flex; gap: .75rem; flex-wrap: wrap; margin-top: 1rem; }
        a.btn { display: inline-block; padding: .8rem 1rem; border-radius: 12px; text-decoration: none; }
        .btn-primary { background: #1d4ed8; color: #fff; }
        .btn-secondary { background: #e5e7eb; color: #111827; }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="card">
            <h1>12bytes</h1>
            <p>Your shared platform foundation is ready. Sign in to finish onboarding and reach the dashboard.</p>
            <div class="actions">
                <a class="btn btn-primary" href="/accounts/login/">Sign in</a>
                <a class="btn btn-secondary" href="/accounts/signup/">Create account</a>
            </div>
        </div>
    </div>
</body>
</html>
