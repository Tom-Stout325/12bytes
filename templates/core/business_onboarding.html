<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Business onboarding</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f6f7f9;
            color: #1f2937;
        }
        .wrap {
            max-width: 560px;
            margin: 48px auto;
            padding: 0 16px;
        }
        .card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.06);
        }
        h1 {
            margin-top: 0;
            margin-bottom: 8px;
            font-size: 1.8rem;
        }
        p {
            margin-top: 0;
            color: #4b5563;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            box-sizing: border-box;
        }
        .helptext, .errorlist {
            margin-top: 8px;
        }
        .errorlist {
            color: #b91c1c;
            padding-left: 18px;
        }
        button {
            margin-top: 16px;
            background: #111827;
            color: #fff;
            border: 0;
            border-radius: 10px;
            padding: 12px 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="card">
            <h1>Create your business</h1>
            <p>This is the first core step. Accounts and company profile wiring can be added next.</p>

            <form method="post" novalidate>
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit">Save business</button>
            </form>
        </div>
    </div>
</body>
</html>
