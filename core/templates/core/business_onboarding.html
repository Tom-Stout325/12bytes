<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Business Onboarding</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 640px; margin: 3rem auto; padding: 0 1rem; }
        label, input { display: block; width: 100%; }
        input { padding: 0.75rem; margin-top: 0.5rem; margin-bottom: 1rem; }
        button { padding: 0.75rem 1rem; }
    </style>
</head>
<body>
    <h1>Create your first business</h1>
    <p>This is the shared tenant record that the rest of the suite will use.</p>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save business</button>
    </form>
</body>
</html>
